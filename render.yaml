services:
  - type: web
    name: yt-downloader
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz | tar xJ
      mv ffmpeg-*-amd64-static/ffmpeg /usr/local/bin/ffmpeg
    startCommand: gunicorn app:app
